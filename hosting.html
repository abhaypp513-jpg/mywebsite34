<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Socks Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#222;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    width:90%;
    margin:30px auto;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin-bottom:10px;
}

.price{
    color:green;
    font-weight:bold;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#222;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#444;
}
</style>
</head>

<body>

<header>
    <h2>Socks Store</h2>
    <h3>Cart: <span id="cartCount">0</span></h3>
</header>

<div class="container">
    <div class="products" id="products"></div>
</div>

<script>

const socks = [
    {
        id:1,
        name:"Cotton Socks",
        price:199,
        image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"
    },
    {
        id:2,
        name:"Sports Socks",
        price:249,
        image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500"
    },
    {
        id:3,
        name:"Winter Wool Socks",
        price:349,
        image:"https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500"
    },
    {
        id:4,
        name:"Ankle Socks",
        price:149,
        image:"https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=500"
    }
];

let cart = [];

const productsContainer = document.getElementById("products");
const cartCount = document.getElementById("cartCount");

function displayProducts() {

    let html = "";

    for(let i = 0; i < socks.length; i++) {

        html += `
        <div class="card">
            <img src="${socks[i].image}" alt="${socks[i].name}">
            
            <div class="card-content">
                <h3>${socks[i].name}</h3>
                <p class="price">₹${socks[i].price}</p>

                <button onclick="addToCart(${socks[i].id})">
                    Add To Cart
                </button>
            </div>
        </div>
        `;
    }

    productsContainer.innerHTML = html;
}

function addToCart(id) {

    const product = socks.find(function(item){
        return item.id === id;
    });

    cart.push(product);

    cartCount.textContent = cart.length;
}

displayProducts();

</script>

</body>
</html>
